<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeLast - الصفحة الرئيسية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #eeeeee;
            --gray-300: #e0e0e0;
            --gray-400: #bdbdbd;
            --gray-500: #9e9e9e;
            --gray-600: #757575;
            --gray-700: #616161;
            --gray-800: #424242;
            --gray-900: #212121;
            --primary: #6366f1;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--gray-900) 0%, var(--gray-800) 100%);
            color: white;
            padding: 2rem 0;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
        }

        .header-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .logo span {
            color: var(--primary);
        }

        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 50px 16px 20px;
            border-radius: var(--radius-xl);
            border: 2px solid transparent;
            background-color: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            font-weight: 500;
            transition: var(--transition);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .search-input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
        }

        /* Main Content */
        main {
            flex: 1;
            padding: 2.5rem 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-200);
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            position: relative;
            padding-right: 15px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 24px;
            background-color: var(--primary);
            border-radius: var(--radius-sm);
        }

        .episodes-count {
            font-size: 0.9rem;
            color: var(--gray-600);
            background-color: var(--gray-100);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .card {
            background-color: white;
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
        }

        .card-img-container {
            position: relative;
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: linear-gradient(45deg, var(--gray-200), var(--gray-300));
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }

        .card:hover .card-img {
            transform: scale(1.05);
        }

        .card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: var(--primary);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            z-index: 1;
        }

        .card-content {
            padding: 1.25rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-episode {
            font-size: 0.9rem;
            color: var(--gray-600);
            margin-bottom: 0.75rem;
        }

        .card-description {
            font-size: 0.85rem;
            color: var(--gray-700);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-top: auto;
        }

        /* Load More Button */
        .load-more-container {
            text-align: center;
            margin: 2.5rem 0;
        }

        .load-more-btn {
            padding: 14px 36px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-xl);
            border: none;
            background-color: var(--gray-800);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }

        .load-more-btn:hover {
            background-color: var(--gray-900);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .load-more-btn:active {
            transform: translateY(0);
        }

        .load-more-btn:disabled {
            background-color: var(--gray-400);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Footer */
        footer {
            background-color: var(--gray-900);
            color: var(--gray-300);
            padding: 2rem 0;
            text-align: center;
            margin-top: auto;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .footer-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
        }

        .footer-logo span {
            color: var(--primary);
        }

        .copyright {
            font-size: 0.9rem;
            color: var(--gray-500);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background-color: white;
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: var(--shadow-lg);
        }

        .modal.show {
            transform: scale(1);
            opacity: 1;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--gray-900);
            color: white;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 2;
        }

        .modal-close:hover {
            background-color: var(--gray-800);
            transform: rotate(90deg);
        }

        .modal-header {
            padding: 2rem 2rem 1rem;
            border-bottom: 1px solid var(--gray-200);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            font-size: 1rem;
            color: var(--gray-600);
        }

        .modal-body {
            padding: 1.5rem 2rem 2rem;
        }

        .modal-description {
            color: var(--gray-700);
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        .modal-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .info-item {
            background-color: var(--gray-50);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border-left: 3px solid var(--primary);
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray-600);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--gray-400);
        }

        .empty-state-text {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .empty-state-subtext {
            font-size: 0.9rem;
            color: var(--gray-500);
        }

        /* Loading Animation */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 1rem;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }
            
            .modal-info {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            
            .card-img-container {
                height: 150px;
            }
            
            .search-input {
                padding: 14px 45px 14px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <h1 class="logo">ANIME<span>LAST</span></h1>
                <div class="search-wrapper">
                    <input type="text" id="search" class="search-input" placeholder="ابحث عن الأنمي المفضل...">
                    <div class="search-icon">🔍</div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="section-header">
            <h2 class="section-title">أحدث الحلقات</h2>
            <div class="episodes-count" id="episodesCount">يتم التحميل...</div>
        </div>

        <div class="grid" id="episodes"></div>

        <div class="load-more-container">
            <button id="loadMoreBtn" class="load-more-btn">عرض المزيد</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">ANIME<span>LAST</span></div>
                <div class="copyright">© 2025 Anime Last - جميع الحقوق محفوظة</div>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div class="modal-backdrop" id="modalBackdrop">
        <div class="modal" id="modal">
            <button class="modal-close" id="closeModalBtn">×</button>
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">عنوان الحلقة</h3>
                <div class="modal-subtitle" id="modalSubtitle">معلومات إضافية</div>
            </div>
            <div class="modal-body">
                <p class="modal-description" id="modalDescription">وصف الحلقة سيظهر هنا.</p>
                <div class="modal-info" id="modalInfo"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/home-data';
        let episodesPage = 1;
        let nextPageUrl = true;
        let isLoading = false;
        
        const episodesDiv = document.getElementById('episodes');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const searchInput = document.getElementById('search');
        const modalBackdrop = document.getElementById('modalBackdrop');
        const modal = document.getElementById('modal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const modalDescription = document.getElementById('modalDescription');
        const modalInfo = document.getElementById('modalInfo');
        const episodesCount = document.getElementById('episodesCount');

        // بيانات تجريبية للعرض
        const sampleEpisodes = [
            {
                id: 1,
                series: { title: 'هجوم العمالقة' },
                title: 'الحلقة الأخيرة: نحو الشجرة التي تسقي العالم',
                episode_number: 87,
                description: 'الحلقة الختامية من الموسم الأخير من أنمي هجوم العمالقة، حيث تواجه إيرين وأرмин مصير العالم في معركة حاسمة.',
                thumbnail: 'https://via.placeholder.com/300x180/6366f1/ffffff?text=Attack+on+Titan'
            },
            {
                id: 2,
                series: { title: 'ون بيس' },
                title: 'معركة أونيغاشima',
                episode_number: 1050,
                description: 'تستمر المعركة في أونيغاشيما بين لوفي وكايدو بينما يحاول باقي الطاقم إنقاذ وانو.',
                thumbnail: 'https://via.placeholder.com/300x180/757575/ffffff?text=One+Piece'
            },
            {
                id: 3,
                series: { title: 'ديمون سلاير' },
                title: 'مهرجان الترفيه',
                episode_number: 10,
                description: 'يصل تانجيرو وزملاؤه إلى مدينة الترفيه لمطاردة ديمون رفيع المستوى مختبئًا بين الفنانين.',
                thumbnail: 'https://via.placeholder.com/300x180/424242/ffffff?text=Demon+Slayer'
            },
            {
                id: 4,
                series: { title: 'جيوجوتسو كايسن' },
                title: 'معركة شيئيا',
                episode_number: 22,
                description: 'يواجه يوجي وميغومي اللعنة الخاصة في محطة شيئيا في مهمة خطيرة لاستعادة إصبع سوكونا.',
                thumbnail: 'https://via.placeholder.com/300x180/9e9e9e/ffffff?text=Jujutsu+Kaisen'
            },
            {
                id: 5,
                series: { title: 'سباي إكس فاميلي' },
                title: 'مهمة: اختبار النجومية',
                episode_number: 15,
                description: 'تحاول أنيا الفوز بجائزة نجمة في مدرستها للحصول على موعد مع والديها، بينما يواصل لويد مهمته السرية.',
                thumbnail: 'https://via.placeholder.com/300x180/616161/ffffff?text=Spy+x+Family'
            },
            {
                id: 6,
                series: { title: 'بليتش' },
                title: 'عودة بانكاي',
                episode_number: 5,
                description: 'يعود إيتشيجو بقواه الجديدة لمواجهة تهديد جديد للعالم الروحي في قوس الألف عام من الحرب.',
                thumbnail: 'https://via.placeholder.com/300x180/757575/ffffff?text=Bleach'
            }
        ];

        function showLoading() {
            episodesDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            `;
            isLoading = true;
            loadMoreBtn.disabled = true;
            loadMoreBtn.textContent = 'جاري التحميل...';
        }

        function hideLoading() {
            isLoading = false;
            loadMoreBtn.disabled = !nextPageUrl;
            loadMoreBtn.textContent = nextPageUrl ? 'عرض المزيد' : 'لا توجد حلقات أخرى';
        }

        function renderEpisodes(episodes, reset = false) {
            if (reset) {
                episodesDiv.innerHTML = '';
            }

            if (episodes.length === 0) {
                episodesDiv.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📺</div>
                        <div class="empty-state-text">لم يتم العثور على حلقات</div>
                        <div class="empty-state-subtext">حاول البحث باستخدام مصطلحات أخرى</div>
                    </div>
                `;
                hideLoading();
                episodesCount.textContent = '0 حلقة';
                return;
            }

            episodes.forEach(ep => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <div class="card-img-container">
                        <div class="card-badge">الحلقة ${ep.episode_number}</div>
                        ${ep.thumbnail ? 
                            `<img src="${ep.thumbnail}" class="card-img" alt="${ep.series?.title || 'عنوان الحلقة'}">` :
                            `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--gray-500);font-size:14px;">لا توجد صورة</div>`
                        }
                    </div>
                    <div class="card-content">
                        <div class="card-title">${ep.series?.title || 'عنوان غير متوفر'}</div>
                        <div class="card-episode">الحلقة ${ep.episode_number} | ${ep.title || ''}</div>
                        <div class="card-description">${ep.description || 'لا يوجد وصف للحلقة'}</div>
                    </div>
                `;
                div.onclick = () => openModal(ep);
                episodesDiv.appendChild(div);
            });

            episodesCount.textContent = `${episodesDiv.children.length} حلقة`;
            hideLoading();
        }

        function fetchData(reset = false) {
            const search = searchInput.value;
            
            if (reset) {
                episodesPage = 1;
                showLoading();
            } else if (isLoading) {
                return;
            }
            
            // محاكاة استدعاء API مع بيانات تجريبية
            setTimeout(() => {
                let filteredEpisodes = sampleEpisodes;
                
                if (search) {
                    const searchLower = search.toLowerCase();
                    filteredEpisodes = sampleEpisodes.filter(ep => 
                        (ep.series?.title && ep.series.title.toLowerCase().includes(searchLower)) ||
                        (ep.title && ep.title.toLowerCase().includes(searchLower)) ||
                        (ep.description && ep.description.toLowerCase().includes(searchLower))
                    );
                }
                
                // محاكاة التقسيم إلى صفحات
                const startIndex = (episodesPage - 1) * 4;
                const endIndex = startIndex + 4;
                const pageEpisodes = filteredEpisodes.slice(startIndex, endIndex);
                
                nextPageUrl = endIndex < filteredEpisodes.length;
                renderEpisodes(pageEpisodes, reset);
                
                // تحديث حالة زر "تحميل المزيد"
                loadMoreBtn.style.display = nextPageUrl ? 'block' : 'none';
            }, 800);
        }

        function openModal(ep) {
            modalTitle.textContent = ep.series?.title || 'عنوان الحلقة';
            modalSubtitle.textContent = `${ep.title || ''} | الحلقة ${ep.episode_number}`;
            modalDescription.textContent = ep.description || 'لا يوجد وصف للحلقة';
            
            // معلومات إضافية للحلقة
            modalInfo.innerHTML = `
                <div class="info-item">
                    <div class="info-label">رقم الحلقة</div>
                    <div class="info-value">${ep.episode_number}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">السلسلة</div>
                    <div class="info-value">${ep.series?.title || 'غير معروف'}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">الحالة</div>
                    <div class="info-value">مكتمل</div>
                </div>
                <div class="info-item">
                    <div class="info-label">التقييم</div>
                    <div class="info-value">4.8/5</div>
                </div>
            `;
            
            modalBackdrop.classList.add('show');
            setTimeout(() => modal.classList.add('show'), 10);
        }

        // تحميل المزيد
        loadMoreBtn.onclick = () => {
            if (nextPageUrl && !isLoading) {
                episodesPage++;
                fetchData();
            }
        };

        // إغلاق المودال
        closeModalBtn.onclick = () => {
            modal.classList.remove('show');
            setTimeout(() => modalBackdrop.classList.remove('show'), 300);
        };

        // إغلاق المودال بالنقر خارجها
        modalBackdrop.onclick = (e) => {
            if (e.target === modalBackdrop) {
                modal.classList.remove('show');
                setTimeout(() => modalBackdrop.classList.remove('show'), 300);
            }
        };

        // بحث تلقائي
        let debounceTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                fetchData(true);
            }, 500);
        });

        // جلب البيانات أول مرة
        fetchData(true);

        // إغلاق المودال بالضغط على زر Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalBackdrop.classList.contains('show')) {
                modal.classList.remove('show');
                setTimeout(() => modalBackdrop.classList.remove('show'), 300);
            }
        });
    </script>
</body>
</html>
