<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home Data Test</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    h2 { margin-top: 30px; }
    .item { padding: 10px; background: #fff; margin: 5px 0; border-radius: 5px; }
  </style>
</head>
<body>

<h1>اختبار جلب بيانات من Laravel</h1>

<div>
  <label>بحث: <input type="text" id="search" /></label>
  <button onclick="loadData()">بحث</button>
</div>

<h2>الحلقات</h2>
<div id="episodes"></div>

<h2>الأنميات</h2>
<div id="animes"></div>

<h2>الأخبار</h2>
<div id="news"></div>

<script>
  const API_URL = '/home-data';

  function loadData() {
    const search = document.getElementById('search').value;
    fetch(`${API_URL}?search=${encodeURIComponent(search)}`)
      .then(res => res.json())
      .then(data => {
        const episodesDiv = document.getElementById('episodes');
        episodesDiv.innerHTML = '';
        data.episodes.forEach(ep => {
          const div = document.createElement('div');
          div.className = 'item';
          div.textContent = ep.title + ' - الحلقة: ' + ep.episode_number;
          episodesDiv.appendChild(div);
        });

        const animesDiv = document.getElementById('animes');
        animesDiv.innerHTML = '';
        data.animes.forEach(anime => {
          const div = document.createElement('div');
          div.className = 'item';
          div.textContent = anime.title;
          animesDiv.appendChild(div);
        });

        const newsDiv = document.getElementById('news');
        newsDiv.innerHTML = '';
        data.news.forEach(n => {
          const div = document.createElement('div');
          div.className = 'item';
          div.textContent = n.title;
          newsDiv.appendChild(div);
        });
      })
      .catch(err => console.error(err));
  }

  // تحميل البيانات عند فتح الصفحة
  loadData();
</script>

</body>
</html>
