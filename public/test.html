<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AnimeLast - الصفحة الرئيسية</title>
<style>
body {
    font-family: 'Cairo', sans-serif;
    background-color: #f9f9f9;
    margin: 0;
    color: #111;
}
header, footer { text-align: center; padding: 20px; background: #fff; border-bottom: 1px solid #ccc; }
h1 { color: #6366f1; }
.search-wrapper { position: relative; width: 300px; margin: 0 auto; }
.search-wrapper::after {
    content: '🔍';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
}
input {
    width: 100%;
    padding: 10px 40px 10px 15px;
    border-radius: 25px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    transition: 0.3s;
}
input:focus { border-color: #6366f1; box-shadow: 0 0 8px rgba(99,102,241,0.5); }

.grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap: 20px; margin-top: 20px; }
.card { background-color: #fff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s; cursor: pointer; }
.card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 12px 20px rgba(0,0,0,0.2); }
.card img { width: 100%; height: 150px; object-fit: cover; }
.card-content { padding: 10px; }
.card-title { font-weight: bold; font-size: 14px; margin: 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-episode { font-size: 12px; color: #555; }
#loadMoreBtn {
    margin: 20px auto;
    display: block;
    padding: 10px 30px;
    font-weight: bold;
    border-radius: 25px;
    border: 1px solid #ccc;
    background-color: #fff;
    cursor: pointer;
    transition: 0.3s;
}
#loadMoreBtn:hover { background-color: #6366f1; color: #fff; border-color: #6366f1; }

.modal-backdrop { position: fixed; inset:0; background-color: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
.modal-backdrop.show { opacity: 1; pointer-events: auto; }
.modal { background-color: #fff; border-radius: 20px; max-width: 400px; width: 90%; padding: 20px; position: relative; transform: scale(0.95); transition: all 0.3s; }
.modal.show { transform: scale(1); }
.modal-close { position: absolute; top: 10px; left: 10px; background: #000; color: #fff; border:none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; }
.modal h3 { margin: 10px 0; }
</style>
</head>
<body>

<header>
    <h1>ANIME LAST</h1>
    <div class="search-wrapper">
        <input type="text" id="search" placeholder="بحث...">
    </div>
</header>

<main>
    <div class="grid" id="episodes"></div>
    <button id="loadMoreBtn">المزيد</button>
</main>

<footer>
    © 2025 Anime Last
</footer>

<div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
        <button class="modal-close" id="closeModalBtn">×</button>
        <div id="modalContent"></div>
    </div>
</div>

<script>
const API_URL = '/home-data'; // ضع endpoint الخاص بالحلقة هنا
let episodesPage = 1;
let nextPageUrl = true;
const episodesDiv = document.getElementById('episodes');
const loadMoreBtn = document.getElementById('loadMoreBtn');
const searchInput = document.getElementById('search');
const modalBackdrop = document.getElementById('modalBackdrop');
const modalContent = document.getElementById('modalContent');
const closeModalBtn = document.getElementById('closeModalBtn');

function fetchData(reset=false){
    const search = searchInput.value;
    fetch(`${API_URL}?search=${encodeURIComponent(search)}&page=${episodesPage}`)
        .then(res => res.json())
        .then(data => {
            if(reset) episodesDiv.innerHTML='';
            data.episodes.forEach(ep=>{
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    ${ep.thumbnail ? `<img src="/storage/${ep.thumbnail}" />` :
                    `<div style="height:150px;background:#eee;display:flex;align-items:center;justify-content:center;">No Img</div>`}
                    <div class="card-content">
                        <div class="card-title">${ep.series?.title || 'عنوان غير متوفر'}</div>
                        <div class="card-episode">الحلقة ${ep.episode_number} | ${ep.title || ''}</div>
                    </div>
                `;
                div.onclick = ()=> window.location.href = `anime.html?id=${ep.id}`;
                episodesDiv.appendChild(div);
            });
            nextPageUrl = data.episodes.length>0;
        });
}

// فتح المودال (يمكن تعديله لاحقاً)
function openModal(ep){
    modalContent.innerHTML = `
        <h3>${ep.series?.title || 'عنوان الحلقة'}</h3>
        <p>${ep.title || ''}</p>
        <p style="font-size:12px;color:#555;">${ep.description || 'لا يوجد وصف للحلقة'}</p>
    `;
    modalBackdrop.classList.add('show');
    document.querySelector('.modal').classList.add('show');
}

closeModalBtn.onclick = ()=>{
    document.querySelector('.modal').classList.remove('show');
    modalBackdrop.classList.remove('show');
}

// تحميل المزيد
loadMoreBtn.onclick = ()=>{
    if(nextPageUrl) { episodesPage++; fetchData(); }
};

// بحث تلقائي
let debounceTimer;
searchInput.addEventListener('input', ()=>{
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(()=>{
        episodesPage = 1; fetchData(true);
    }, 300);
});

// جلب البيانات أول مرة
fetchData();
</script>

</body>
</html>
