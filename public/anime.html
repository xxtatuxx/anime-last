<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AnimeLast - تفاصيل الحلقة</title>
<style>
body {
    font-family: 'Cairo', sans-serif;
    background:#f9f9f9;
    margin:0;
    color:#111;
}
header, footer { text-align:center; padding:20px; background:#fff; border-bottom:1px solid #ccc; }
h1,h2 { color:#6366f1; }
.container { max-width:1200px; margin:20px auto; padding:0 20px; }
.anime-header { display:flex; gap:20px; margin-bottom:20px; }
.anime-header img { width:250px; height:350px; object-fit:cover; border-radius:15px; }
.anime-info { flex:1; }
.anime-info h2 { margin-top:0; }
.anime-info p { line-height:1.5; margin:10px 0; }
.episode-list, .latest-episodes { display:flex; flex-wrap:wrap; gap:15px; margin-top:20px; }
.card {
    flex:1 1 120px;
    background-color:#fff;
    padding:10px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    cursor:pointer;
    text-align:center;
    transition:all 0.3s;
}
.card:hover { transform:translateY(-3px) scale(1.05); box-shadow:0 10px 15px rgba(0,0,0,0.15); }
.card img { width:100%; height:150px; object-fit:cover; }
.card-title { font-weight:bold; font-size:14px; margin:5px 0; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-episode { font-size:12px; color:#555; }
h3 { margin-top:40px; color:#6366f1; }
</style>
</head>
<body>

<header>
    <h1>ANIME LAST</h1>
</header>

<div class="container">
    <div id="animeInfo" class="anime-header">
        <!-- معلومات الأنمي ستحمل بواسطة JS -->
    </div>

    <h3>جميع الحلقات</h3>
    <div id="allEpisodes" class="episode-list"></div>

    <h3>آخر الحلقات المضافة</h3>
    <div id="latestEpisodes" class="latest-episodes"></div>
</div>

<footer>
    © 2025 Anime Last
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const episodeId = params.get('id');
if(!episodeId) { alert('لا يوجد ID الحلقة'); }

const animeInfoDiv = document.getElementById('animeInfo');
const allEpisodesDiv = document.getElementById('allEpisodes');
const latestEpisodesDiv = document.getElementById('latestEpisodes');

fetch(`/web-api/episode/${episodeId}`)
.then(res => res.json())
.then(data => {
    const ep = data.episode;
    const series = data.series;
    const allEpisodes = data.allEpisodes;
    const latestEpisodes = data.latestEpisodes;

    // معلومات الأنمي
    animeInfoDiv.innerHTML = `
        <img src="/storage/${series.cover}" alt="${series.title}">
        <div class="anime-info">
            <h2>${series.title}</h2>
            <p>${series.description || 'لا يوجد وصف متاح لهذا الأنمي.'}</p>
            <p><strong>الحلقة الحالية:</strong> ${ep.episode_number} - ${ep.title}</p>
        </div>
    `;

    // جميع الحلقات
    allEpisodes.forEach(e=>{
        const div = document.createElement('div');
        div.className = 'card';
        div.textContent = `الحلقة ${e.episode_number} | ${e.title || ''}`;
        div.onclick = ()=> window.location.href = `anime.html?id=${e.id}`;
        allEpisodesDiv.appendChild(div);
    });

    // آخر الحلقات المضافة
    latestEpisodes.forEach(e=>{
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
            ${e.thumbnail ? `<img src="/storage/${e.thumbnail}" />` :
            `<div style="height:150px;background:#eee;display:flex;align-items:center;justify-content:center;">No Img</div>`}
            <div class="card-title">${e.series?.title || 'عنوان غير متوفر'}</div>
            <div class="card-episode">الحلقة ${e.episode_number}</div>
        `;
        div.onclick = ()=> window.location.href = `anime.html?id=${e.id}`;
        latestEpisodesDiv.appendChild(div);
    });
})
.catch(err=>console.error('حدث خطأ أثناء جلب بيانات الأنمي.', err));
</script>

</body>
</html>
